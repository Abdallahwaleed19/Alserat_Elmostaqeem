      <stop offset="0" stop-color="#0C3E36"/>
      <stop offset="0.55" stop-color="#0F5A47"/>
      <stop offset="1" stop-color="#082823"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.52">
