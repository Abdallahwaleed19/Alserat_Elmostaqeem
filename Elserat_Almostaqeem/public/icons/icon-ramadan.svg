    <path d="M595 220c110 35 190 138 190 260 0 151-122 273-273 273-95 0-179-48-228-122 42 22 90 35 141 35 166 0 300-134 300-300 0-52-13-100-36-146 1 0 3 0 6 0z" fill="url(#gold)"/>

